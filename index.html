<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>帝都医院查询 - 智能导诊助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f6f8fa;
            -webkit-tap-highlight-color: transparent;
        }
        
        .hospital-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hospital-card:active {
            transform: scale(0.97);
            background-color: #f1f5f9;
        }
        
        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
            50% { 
                opacity: .7; 
                transform: translateY(-2px); 
            }
        }
        
        /* 隐藏滚动条但保留功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        /* Tab 激活状态 */
        .tab-active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 pb-24">
    <!-- 顶部搜索区 -->
    <div class="bg-white px-5 pt-8 pb-5 sticky top-0 z-50 border-b border-slate-100 shadow-sm">
        <div class="flex items-center justify-between mb-5">
            <h1 class="text-2xl font-black text-blue-600 flex items-center gap-2">
                <i data-lucide="activity" class="w-7 h-7"></i>
                帝都医院查询
            </h1>
            <span class="text-[10px] bg-blue-50 text-blue-500 px-2 py-1 rounded-lg font-bold">
                北京版 v1.0
            </span>
        </div>
        
        <div class="relative">
            <input 
                type="text" 
                id="searchInput"
                placeholder="试试输入：嗓子疼、骨折、眼睛红..." 
                class="w-full pl-12 pr-24 py-4 bg-slate-100 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 transition-all outline-none text-base"
            >
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            <button 
                onclick="handleSearch()"
                class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200"
            >
                AI 分析
            </button>
        </div>
        
        <div class="mt-3 flex items-center gap-2 overflow-x-auto hide-scrollbar">
            <span class="text-[11px] text-slate-400 whitespace-nowrap">热门：</span>
            <button onclick="quickSearch('嗓子疼')" class="text-[11px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full whitespace-nowrap">嗓子疼</button>
            <button onclick="quickSearch('骨折')" class="text-[11px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full whitespace-nowrap">骨折</button>
            <button onclick="quickSearch('头疼')" class="text-[11px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full whitespace-nowrap">头疼</button>
            <button onclick="quickSearch('小孩发烧')" class="text-[11px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full whitespace-nowrap">小孩发烧</button>
        </div>
    </div>

    <!-- 免责声明 -->
    <div class="mx-4 mt-4 px-4 py-3 bg-yellow-50 border border-yellow-200 rounded-xl">
        <p class="text-xs text-yellow-800 text-center">
            ⚠️ 本工具仅供参考，不构成医疗建议。请以医生诊断为准。
        </p>
    </div>

    <!-- AI 导诊结果反馈区（Gemini 风格）-->
    <div id="aiAnalysis" class="hidden mx-4 mt-4 bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden transition-all">
        <!-- 蓝色顶部条 -->
        <div class="bg-blue-600 px-5 py-3 flex items-center justify-between">
            <span class="text-white text-xs font-bold flex items-center gap-1">
                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> 
                AI 推荐匹配科室
            </span>
            <span class="text-blue-100 text-[10px]">北京三甲大数据分析</span>
        </div>
        
        <!-- 白色内容区 -->
        <div class="p-5">
            <p id="aiResultText" class="text-[13px] text-slate-600 leading-relaxed font-medium whitespace-pre-line"></p>
        </div>
    </div>

    <!-- 科室切换 Tab（多科室时显示）-->
    <div id="deptTabsSection" class="hidden mx-4 mt-4">
        <p class="text-[11px] font-black text-slate-400 mb-3 px-1 uppercase tracking-tighter">切换查看科室优势医院</p>
        <div id="deptTabs" class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            <!-- 动态生成科室 Tab -->
        </div>
    </div>

    <!-- 列表标题 -->
    <div class="px-5 mt-6 flex justify-between items-end">
        <h2 id="listTitle" class="text-lg font-bold text-slate-800">推荐医院</h2>
        <span class="text-xs text-slate-400">为您精选北京 TOP 医院</span>
    </div>

    <!-- 医院列表 -->
    <main class="px-4 py-4 space-y-5" id="hospitalContainer">
        <!-- 动态注入内容 -->
    </main>

    <!-- 底部 Tabbar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-100 px-8 py-3 flex justify-between items-center z-50">
        <button class="flex flex-col items-center text-blue-600">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">首页</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <i data-lucide="navigation" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">挂号</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <i data-lucide="heart" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">收藏</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <i data-lucide="user-round" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-medium">我的</span>
        </button>
    </nav>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
