<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询按钮测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">查询按钮测试</h1>
        
        <div class="relative">
            <input 
                type="text" 
                id="searchInput"
                placeholder="输入症状..."
                class="w-full pl-4 pr-24 py-3 border rounded-xl"
            >
            <button 
                id="searchButton"
                type="button"
                class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-blue-700"
            >
                查询
            </button>
        </div>
        
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded hidden"></div>
    </div>

    <script>
        console.log('页面加载完成');
        
        // 等待 DOM 加载
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 加载完成');
            
            const searchButton = document.getElementById('searchButton');
            const searchInput = document.getElementById('searchInput');
            const result = document.getElementById('result');
            
            console.log('searchButton:', searchButton);
            console.log('searchInput:', searchInput);
            
            if (searchButton) {
                searchButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('按钮被点击！');
                    
                    const query = searchInput.value.trim();
                    result.classList.remove('hidden');
                    result.textContent = `查询内容：${query || '(空)'}`;
                });
                console.log('✅ 事件绑定成功');
            } else {
                console.error('❌ 找不到按钮');
            }
        });
    </script>
</body>
</html>
