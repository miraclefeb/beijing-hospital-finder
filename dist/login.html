<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 帝都医院查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="stethoscope" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800">帝都医院查询</h1>
            <p class="text-sm text-slate-400 mt-1">智能导诊，精准推荐</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">手机号</label>
                <input 
                    type="tel" 
                    id="phone"
                    placeholder="请输入手机号" 
                    maxlength="11"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">密码</label>
                <input 
                    type="password" 
                    id="password"
                    placeholder="请输入密码" 
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    required
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200"
            >
                登录
            </button>
        </form>

        <!-- 注册链接 -->
        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">
                还没有账号？
                <a href="./register.html" class="text-blue-600 font-bold">立即注册</a>
            </p>
        </div>

        <!-- 游客入口 -->
        <div class="mt-4 text-center">
            <a href="./index.html" class="text-sm text-slate-400 hover:text-slate-600">
                暂不登录，直接使用 →
            </a>
        </div>

        <!-- 提示信息 -->
        <div id="message" class="hidden mt-4 p-3 rounded-xl text-sm text-center"></div>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const messageBox = document.getElementById('message');

        // 简单的本地存储登录（演示版）
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            // 验证手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showMessage('请输入正确的手机号', 'error');
                return;
            }

            // 验证密码长度
            if (password.length < 6) {
                showMessage('密码至少6位', 'error');
                return;
            }

            // 模拟登录（实际应该调用后端API）
            showMessage('登录中...', 'info');
            
            setTimeout(() => {
                // 保存登录状态到 localStorage
                localStorage.setItem('userPhone', phone);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginTime', new Date().toISOString());
                
                showMessage('登录成功！', 'success');
                
                // 跳转到首页
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 1000);
            }, 1000);
        });

        function showMessage(text, type) {
            messageBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-600', 'bg-blue-50', 'text-blue-600');
            
            if (type === 'error') {
                messageBox.classList.add('bg-red-50', 'text-red-600');
            } else if (type === 'success') {
                messageBox.classList.add('bg-green-50', 'text-green-600');
            } else {
                messageBox.classList.add('bg-blue-50', 'text-blue-600');
            }
            
            messageBox.innerText = text;
            messageBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
